<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Unite TZ</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a0a0a;
    --card: #141414;
    --card2: #1a1a1a;
    --border: #2a2a2a;
    --text: #ffffff;
    --muted: #666;
    --accent: #FFE500;
    --red: #ff4444;
    --green: #44ff88;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; min-height: 100vh; }

  /* Header */
  .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .header-logo { display: flex; align-items: center; gap: 8px; }
  .logo-icon { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; color: #000; }
  .header-title { font-size: 16px; font-weight: 600; }
  .header-count { background: var(--accent); color: #000; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }

  /* Tabs */
  .tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--border); padding: 0 16px; }
  .tab { flex: 1; padding: 12px 0; font-size: 12px; text-align: center; color: var(--muted); border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.2s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

  /* Content */
  .content { padding: 12px 16px; }

  /* Task Card */
  .task-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.2s; }
  .task-card:active { border-color: var(--accent); }
  .task-card.urgent { border-left: 3px solid var(--red); }
  .task-card.normal { border-left: 3px solid var(--accent); }
  .task-card.done { opacity: 0.5; }
  .task-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
  .task-name { font-size: 14px; font-weight: 600; flex: 1; margin-right: 8px; }
  .badge { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
  .badge.urgent { background: rgba(255,68,68,0.15); color: var(--red); }
  .badge.normal { background: rgba(255,229,0,0.15); color: var(--accent); }
  .badge.done { background: rgba(68,255,136,0.15); color: var(--green); }
  .task-meta { display: flex; flex-direction: column; gap: 4px; }
  .meta-row { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  .meta-row span { color: #aaa; }

  /* Detail View */
  .detail { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 100; overflow-y: auto; }
  .detail.open { display: block; }
  .detail-header { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 16px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; }
  .back-btn { width: 32px; height: 32px; border-radius: 8px; background: var(--card2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; }
  .detail-title { font-size: 16px; font-weight: 600; flex: 1; }
  .detail-body { padding: 16px; }
  .detail-section { margin-bottom: 16px; }
  .detail-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .detail-value { font-size: 14px; color: var(--text); background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; line-height: 1.5; }
  .detail-value a { color: var(--accent); }
  .detail-actions { display: flex; gap: 8px; margin-top: 20px; }
  .btn { flex: 1; padding: 13px; border-radius: 10px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; }
  .btn-done { background: var(--accent); color: #000; }
  .btn-delete { background: rgba(255,68,68,0.15); color: var(--red); border: 1px solid rgba(255,68,68,0.3); }
  .priority-pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; margin-bottom: 16px; }
  .priority-pill.urgent { background: rgba(255,68,68,0.15); color: var(--red); }
  .priority-pill.normal { background: rgba(255,229,0,0.15); color: var(--accent); }

  /* FAB */
  .fab { position: fixed; bottom: 20px; right: 16px; width: 52px; height: 52px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #000; box-shadow: 0 4px 16px rgba(255,229,0,0.3); cursor: pointer; z-index: 50; }

  /* Empty */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }

  /* From badge */
  .from-badge { display: inline-flex; align-items: center; gap: 4px; background: var(--card2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; font-size: 12px; color: #aaa; }

  /* Stats */
  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .stat { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px; text-align: center; }
  .stat-num { font-size: 20px; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 10px; color: var(--muted); margin-top: 2px; }
</style>
</head>
<body>

<!-- Main -->
<div id="main-view">
  <div class="header">
    <div class="header-logo">
      <div class="logo-icon">U</div>
      <div class="header-title">Unite TZ</div>
    </div>
    <div class="header-count" id="active-count">0 активных</div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('active')">Активные</div>
    <div class="tab" onclick="switchTab('urgent')">Срочные</div>
    <div class="tab" onclick="switchTab('done')">Выполнено</div>
  </div>

  <div class="content">
    <div class="stats">
      <div class="stat"><div class="stat-num" id="stat-all">0</div><div class="stat-label">Всего</div></div>
      <div class="stat"><div class="stat-num" id="stat-urgent" style="color:var(--red)">0</div><div class="stat-label">Срочных</div></div>
      <div class="stat"><div class="stat-num" id="stat-done" style="color:var(--green)">0</div><div class="stat-label">Готово</div></div>
    </div>
    <div id="task-list"></div>
  </div>
</div>

<!-- Detail -->
<div class="detail" id="detail-view">
  <div class="detail-header">
    <div class="back-btn" onclick="closeDetail()">←</div>
    <div class="detail-title" id="detail-name">Задача</div>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  tg.setHeaderColor('#0a0a0a');

  // Demo tasks — в реальном проекте грузятся с сервера
  let tasks = JSON.parse(localStorage.getItem('tz_tasks') || 'null') || [
    { id: 1, name: "Reels для Nike", client: "Nike Uzbekistan", description: "Монтаж 3 роликов по 30 секунд. Референсы в папке. Музыка: трек 2.", deadline: "27.04.2026 20:00", materials: "https://drive.google.com/...", priority: "срочно", done: false, from_username: "bekhruz_pm", created_at: new Date().toISOString() },
    { id: 2, name: "Сторис Adidas", client: "Adidas UZ", description: "10 сторис для запуска новой коллекции. Шрифт — Helvetica.", deadline: "28.04.2026 18:00", materials: "", priority: "обычно", done: false, from_username: "aisha_pm", created_at: new Date().toISOString() },
    { id: 3, name: "Видео-обзор Samsung", client: "Samsung UZ", description: "Обзор телефона 2 минуты. Текст уже готов.", deadline: "26.04.2026 15:00", materials: "https://drive.google.com/...", priority: "обычно", done: true, from_username: "kamol_pm", created_at: new Date().toISOString() },
  ];

  var currentTab = 'active';
  var currentTask = null;

  function saveTasks() { localStorage.setItem('tz_tasks', JSON.stringify(tasks)); }

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(function(t,i) { t.classList.toggle('active', ['active','urgent','done'][i] === tab); });
    renderTasks();
  }

  function renderTasks() {
    const list = document.getElementById('task-list');
    let filtered = tasks;
    if (currentTab === 'active') filtered = tasks.filter(t => !t.done);
    if (currentTab === 'urgent') filtered = tasks.filter(t => !t.done && t.priority === 'срочно');
    if (currentTab === 'done') filtered = tasks.filter(t => t.done);

    // Stats
    document.getElementById('stat-all').textContent = tasks.length;
    document.getElementById('stat-urgent').textContent = tasks.filter(t => !t.done && t.priority === 'срочно').length;
    document.getElementById('stat-done').textContent = tasks.filter(t => t.done).length;
    document.getElementById('active-count').textContent = tasks.filter(t=>!t.done).length + ' активных';

    if (!filtered.length) {
      list.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Задач нет</div></div>';
      return;
    }

    list.innerHTML = filtered.map(t => `
      <div class="task-card ${t.priority === 'срочно' ? 'urgent' : 'normal'} ${t.done ? 'done' : ''}" onclick="openDetail(${t.id})">
        <div class="task-header">
          <div class="task-name">${t.name}</div>
          <div class="badge ${t.done ? 'done' : t.priority === 'срочно' ? 'urgent' : 'normal'}">${t.done ? '✓ готово' : t.priority}</div>
        </div>
        <div class="task-meta">
          <div class="meta-row">🏢 <span>${t.client}</span></div>
          <div class="meta-row">📅 <span>${t.deadline}</span></div>
          <div class="meta-row">👤 <span>@${t.from_username}</span></div>
        </div>
      </div>
    `).join('');
  }

  function openDetail(id) {
    currentTask = tasks.find(t => t.id === id);
    if (!currentTask) return;
    const t = currentTask;

    document.getElementById('detail-name').textContent = t.name;
    document.getElementById('detail-body').innerHTML = `
      <div class="priority-pill ${t.priority === 'срочно' ? 'urgent' : 'normal'}">
        ${t.priority === 'срочно' ? '🔴' : '🟡'} ${t.priority}
      </div>

      <div class="detail-section">
        <div class="detail-label">Клиент</div>
        <div class="detail-value">${t.client}</div>
      </div>

      <div class="detail-section">
        <div class="detail-label">Описание задачи</div>
        <div class="detail-value">${t.description}</div>
      </div>

      <div class="detail-section">
        <div class="detail-label">Дедлайн</div>
        <div class="detail-value">📅 ${t.deadline}</div>
      </div>

      ${t.materials ? `
      <div class="detail-section">
        <div class="detail-label">Материалы</div>
        <div class="detail-value"><a href="${t.materials}" target="_blank">🔗 Открыть файлы</a></div>
      </div>` : ''}

      <div class="detail-section">
        <div class="detail-label">Поставил задачу</div>
        <div class="detail-value from-badge">@${t.from_username}</div>
      </div>

      ${!t.done ? `
      <div class="detail-actions">
        <button class="btn btn-done" onclick="markDone(${t.id})">✅ Готово</button>
        <button class="btn btn-delete" onclick="deleteTask(${t.id})">🗑</button>
      </div>` : `
      <div style="text-align:center;padding:16px;color:var(--green);font-weight:600;">✅ Выполнено</div>
      <div class="detail-actions">
        <button class="btn btn-delete" onclick="deleteTask(${t.id})">🗑 Удалить</button>
      </div>`}
    `;
    document.getElementById('detail-view').classList.add('open');
    tg.BackButton.show();
    tg.BackButton.onClick(closeDetail);
  }

  function closeDetail() {
    document.getElementById('detail-view').classList.remove('open');
    tg.BackButton.hide();
    renderTasks();
  }

  function markDone(id) {
    tasks = tasks.map(t => t.id === id ? {...t, done: true} : t);
    saveTasks();
    tg.HapticFeedback.notificationOccurred('success');
    closeDetail();
  }

  function deleteTask(id) {
    if (confirm('Удалить задачу?')) {
      tasks = tasks.filter(t => t.id !== id);
      saveTasks();
      closeDetail();
    }
  }

  renderTasks();
</script>
</body>
</html>
